<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title>Alternating edge (rising and falling superposition)</title>
  <!-- Rising edge (diagonal from bottom-left to top-right) -->
  <path d="M8 36 L40 8" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Falling edge (diagonal from top-left to bottom-right) -->
  <path d="M8 8 L40 36" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
